name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode version
      run: |
        ls /Applications/ | grep Xcode
        xcodebuild -version
    
    - name: List schemes
      run: xcodebuild -project WorldClock.xcodeproj -list
    
    - name: Build app
      run: |
        set -o pipefail
        xcodebuild \
          -project WorldClock.xcodeproj \
          -scheme WorldClock \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          build
        find build -name "*.app" -type d 2>/dev/null || echo "No .app found"
    
    - name: Create IPA
      run: |
        mkdir -p Payload
        cp -R build/Build/Products/Release-iphoneos/WorldClock.app Payload/
        zip -r WorldClock.ipa Payload
        rm -rf Payload
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: WorldClock.ipa
        path: WorldClock.ipa
